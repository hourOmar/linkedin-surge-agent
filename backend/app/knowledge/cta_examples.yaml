title: CTA Examples

description: >
  Approved call-to-action examples for LinkedIn content.
  The LinkedIn Surge Agent should select CTAs that encourage
  meaningful engagement while maintaining a professional,
  educational, and community-focused tone.

discussion:
  - What are your thoughts on this?
  - How is your organization approaching this challenge?
  - We'd love to hear your perspective.
  - Share your experience in the comments.

community:
  - Let's build the future together.
  - Join the conversation.
  - Connect with fellow innovators.
  - Collaborate with us to create real-world impact.

learning:
  - Explore the possibilities of AI-driven innovation.
  - Discover how AI is transforming the energy sector.
  - Learn more about our work and initiatives.

events:
  - Join us at our upcoming event.
  - Be part of the next generation of innovators.
  - Register to participate and build with us.

guidelines:
  - Prioritize discussion over promotion.
  - Encourage collaboration.
  - Keep CTAs natural and relevant to the content.
  - Avoid aggressive sales language.